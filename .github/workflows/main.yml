name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup and Build
        run: |
          unzip FastCinema_source.zip || true
          cd FastCinema
          sed -i 's/android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:hintTextColor="#666666"//g' app/src/main/res/layout/activity_browser.xml
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o g.zip
          unzip -q g.zip
          ./gradle-8.6/bin/gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: FastCinema/app/build/outputs/apk/debug/app-debug.apk
