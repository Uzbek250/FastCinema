 name: FastCinema APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK o'rnatish
        uses: android-actions/setup-android@v3

      - name: Gradle wrapper fayllarini yaratish
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle-8.6.zip
          unzip -q gradle-8.6.zip
          ./gradle-8.6/bin/gradle wrapper
          chmod +x gradlew

      - name: Debug APK build
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK saqlash
        uses: actions/upload-artifact@v4
        with:
          name: FastCinema-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
