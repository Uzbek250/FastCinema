name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup and Build
        run: |
          unzip FastCinema_source_v2.zip || true
          cd FastCinema
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o g.zip
          unzip -q g.zip
          ./gradle-8.6/bin/gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -80
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: FastCinema/app/build/outputs/apk/debug/app-debug.apk
