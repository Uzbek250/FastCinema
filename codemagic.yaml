workflows:
  android-apk-workflow:
    name: FastCinema Android APK Build
    max_build_duration: 60
    instance_type: linux_x86_64
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - name: default
      vars:
        PACKAGE_NAME: "com.example.fastcinema"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
