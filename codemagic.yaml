workflows:
  android-apk-workflow:
    name: FastCinema Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          unzip FastCinema_source_v3.zip || true
          cd FastCinema
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o g.zip
          unzip -q g.zip
          ./gradle-8.6/bin/gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - FastCinema/app/build/outputs/apk/debug/app-debug.apk
