workflows:
  android-apk-workflow:
    name: FastCinema Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          cd FastCinema
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - FastCinema/app/build/outputs/apk/release/*.apk                                                                                  - FastCinema/app/build/outputs/apk/release/*.apk
